<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fundo com o gradiente do botão -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7B61FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="100" height="100" rx="20" fill="url(#grad)" />
  
  <!-- Letra T minimalista -->
  <text x="50%" y="70%" font-family="Arial, sans-serif" font-weight="bold" font-size="65" fill="white" text-anchor="middle">T</text>
  
  <!-- Opcional: Barras que remetem ao < /> -->
  <rect x="15" y="45" width="10" height="2" rx="1" fill="white" opacity="0.8" />
  <rect x="75" y="45" width="10" height="2" rx="1" fill="white" opacity="0.8" />
</svg>
